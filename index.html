<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В'язання</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Схеми для в'язання</h1>
    </header>
    <body>
        <section class="double">
            <article class="choice">
                <details>
                    <summary>Тип</summary>
                    <summary><input type="checkbox" id="clothing" value="clothing">Одяг</summary>
                    <summary><input type="checkbox" id="toy" value="toy">Іграшка</summary>
                    <summary><input type="checkbox" id="grannySquar" value="grannySquar">Бабусин квадрат</summary>
                </details>
                <button class="find">Знайти</button>
            </article>
            <article class="add">
                <form>
                    <input type="text", id="name", placeholder="Введіть назву виробу">
                    <input type="img", id="image", placeholder="Додайте посилання на схему">
                    <input type="text", id="type", placeholder="Введіть тип виробу">
                </form>
                <button class="create">Додати</button>
            </article>
        </section>
        <section class="library">
            <div class="card">
                <h4 class="name">Назва</h4>
                <img class="img-html" src="https://i.pinimg.com/236x/66/0b/56/660b56f3b5cbf61df008b2379243f501.jpg">
                <p class="type">Тип</p>
                <button>Перейти</button>
            </div>
        </section>
    </body>

</body>
</html>
