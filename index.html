<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>В'язання</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="home.html">Дізнатись більше про нас</a>
        <h1>Схеми для в'язання</h1>
    </header>
    <main>
        <section class="double">
            <article class="choice">
                    <details>
                        <summary>Тип</summary>
                    
                        <label>
                            <input type="checkbox" value="clothing"> Одяг
                        </label><br>
                    
                        <label>
                            <input type="checkbox" value="other"> Інше
                        </label><br>
                    
                        <label>
                            <input type="checkbox" value="grannySquare"> Бабусин квадрат
                        </label>
                    </details>
                <button class="find">Знайти</button>
            </article>
            <article class="add">
                <form onsubmit="return false;">
                    <input type="text" id="name" placeholder="Введіть назву виробу">
                    <input type="text" id="image" placeholder="Додайте посилання на схему">
                    <input type="text" id="type" placeholder="Введіть тип виробу англійською (clothing, other, grannySquar)">
                </form>
                <button class="create">Додати</button>
            </article>
        </section>
        <section class="library">
            <div class="card">
                <h4 class="name">Назва</h4>
                <img class="img-html" src="https://i.pinimg.com/236x/66/0b/56/660b56f3b5cbf61df008b2379243f501.jpg">
                <p class="type">Тип</p>
                <button>Перейти</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
